version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: hotel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hotel_management    # သင့် SQL database name ပြောင်းလဲနိုင်သည်
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: hotel_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # အကယ်၍ သင့်တွင် .sql file ရှိပါက docker စတက်ချိန် database automatic ဆောက်ပေးရန်
      # - ./database/hotel.sql:/docker-entrypoint-initdb.d/dump.sql

  web:
    build: .
    container_name: hotel_web
    restart: always
    ports:
      - "8080:80"    
    environment:
      - DB_HOST=db
      - DB_USER=hotel_user
      - DB_PASSWORD=hotel_password
      - DB_NAME=hotel_management
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
